<div class="app-container">
  <h1 class="app-title">Books Management System</h1>

  <div class="form-card">
    <input id="newBook" placeholder="Enter book title" type="text" />
    <input id="newDesc" placeholder="Enter description" type="text" />
    <input id="newAuthor" placeholder="Enter author name" type="text" />
    <input id="newGenre" placeholder="Enter genre" type="text" />
    <input id="newPrice" placeholder="Enter price" type="number" step="0.01" />
    <button class="btn-add" (click)="addBook()">📚 Add New Book</button>
  </div>

  <div class="book-list">
    @for (book of books; track book.id) {
      <div class="book-card">
        <div class="book-info">
          <div class="book-title">
            <b>Title:</b> {{ book.title }}
          </div>
          <div class="book-desc">
            <b>Description:</b> {{ book.desc }}
          </div>
          <div class="book-meta">
            <span class="book-author">
              <b>Author:</b> {{ book.author || 'Unknown' }}
            </span>
            <span class="book-genre">
              <b>Genre:</b> {{ book.genre || 'Uncategorized' }}
            </span>
            <span class="book-price">
              <b>Price:</b> ${{ book.price }}
            </span>
          </div>
        </div>
        <button class="btn-delete" (click)="deleteBook(book.id)">
          🗑️ Remove
        </button>
      </div>
    } @empty {
      <div class="empty-state">
        📚 No books available yet. Add your first book above!
      </div>
    }
  </div>
</div>
